<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products | LYNEX Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="admin_dashboard.html">Dashboard</a></li>
                <li><a href="admin_products.html" class="admin-active">Products</a></li>
                <li><a href="admin_orders.html" id="nav-orders">Orders</a></li>
                <li><a href="admin_messages.html" id="nav-messages">Messages</a></li>
                <li><a href="index.html" style="margin-top: 50px;">Go to Website</a></li>
                <li><a href="admin_login.html" onclick="sessionStorage.removeItem('lynex_admin_logged');">Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Products Management</h1>
            </div>

            <div class="data-section" style="margin-bottom: 30px;">
                <h3 style="color: #fff; margin-bottom: 20px;">Add New Product</h3>
                <form id="add-product-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label>Product Name</label>
                            <input type="text" name="name" required placeholder="e.g. Black T-Shirt">
                        </div>
                        <div>
                            <label>Sale Price (৳)</label>
                            <input type="number" name="price" required placeholder="e.g. 500">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label>Original Price (Optional)</label>
                            <input type="number" name="oldPrice" placeholder="e.g. 700">
                        </div>
                        <div>
                            <label>Product Image</label>
                            <input type="file" name="image" accept="image/*" style="padding: 9px;">
                        </div>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="isNew" name="isNew">
                        <label for="isNew" style="display:inline; cursor:pointer; color: #ff9f43; margin-bottom: 0;">Mark as New Arrival (Show on Home)</label>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" style="width: 100%;"><i class="fas fa-plus"></i> Add Product</button>
                </form>
            </div>

            <div class="data-section">
                <h3 style="color: #fff;">Product List (<span id="current-product-count">0</span>)</h3>
                <table id="product-table">
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
