<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products | LYNEX Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="admin_dashboard.html">Dashboard</a></li>
                <li><a href="admin_products.html" class="admin-active">Products</a></li>
                <li><a href="admin_orders.html">Orders</a></li>
                <li><a href="index.html" style="margin-top: 50px;">Go to Website</a></li>
                <li><a href="admin_login.html" onclick="sessionStorage.removeItem('lynex_admin_logged');">Logout</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="dashboard-header"><h1>Products Management</h1></div>
            
            <div class="data-section" style="margin-bottom: 30px;">
                <h3 style="color: #fff; margin-bottom: 20px;">Add New Product</h3>
                <form id="add-product-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <input type="text" name="name" placeholder="Product Name" required>
                        <input type="number" name="price" placeholder="Sale Price (৳)" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <input type="number" name="oldPrice" placeholder="Original Price (Optional)">
                        <input type="file" name="image" accept="image/*" style="padding: 7px;">
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="isNew" name="isNew">
                        <label for="isNew" style="display:inline; color:#ff9f43; cursor:pointer;">Mark as New Arrival (Show on Home)</label>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" style="width: 100%;"><i class="fas fa-plus"></i> Add Product</button>
                </form>
            </div>

            <div class="data-section">
                <h3 style="color: #fff;">Product List (<span id="current-product-count">0</span>)</h3>
                <table id="product-table">
                    <thead><tr><th>Img</th><th>Name</th><th>Price</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
