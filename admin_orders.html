<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders | LYNEX Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="admin_dashboard.html">Dashboard</a></li>
                <li><a href="admin_products.html">Products</a></li>
                <li><a href="admin_orders.html" class="admin-active">Orders</a></li>
                <li><a href="index.html" style="margin-top: 50px;">Go to Website</a></li>
                <li><a href="admin_login.html" onclick="sessionStorage.removeItem('lynex_admin_logged');">Logout</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="dashboard-header"><h1>Orders Management</h1></div>
            
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="filterOrders('All')">All Orders</button>
                <button class="filter-btn" onclick="filterOrders('Pending')">Pending</button>
                <button class="filter-btn" onclick="filterOrders('Delivered')">Completed</button>
                <button class="filter-btn" onclick="filterOrders('Cancelled')">Cancelled</button>
            </div>

            <div class="data-section">
                <table id="orders-table">
                    <thead><tr><th>ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Details</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
