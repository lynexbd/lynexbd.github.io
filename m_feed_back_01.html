    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX</h2>
            <ul>
                <li><a href="x_master_v9.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
                <li><a href="p_data_source_5.html"><i class="fas fa-box"></i> <span>Products</span></a></li>

            </ul>

            <div class="dashboard-header">
                <h1>Customer Feedback</h1>
            </div>

            <div class="filter-tabs">

                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>From</th>
                            <th>Subject</th>
                            <th>Message</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="messages-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
