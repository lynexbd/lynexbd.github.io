<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory | LYNEX Admin</title>
    <meta name="viewport" content="width=1366">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="x_master_v9.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
                <li><a href="p_data_source_5.html" class="admin-active"><i class="fas fa-box-open"></i> <span>Products</span></a></li>
                <li><a href="o_log_file_22.html" id="nav-orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
                <li><a href="m_feed_back_01.html" id="nav-messages"><i class="fas fa-comment-dots"></i> <span>Feedback</span></a></li>
                <li><a href="index.html" target="_blank" style="margin-top: 50px;"><i class="fas fa-globe"></i> <span>Visit Site</span></a></li>
                <li><a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Inventory Management [attachment_0](attachment)</h1>
            </div>
            
            <div class="data-section" style="margin-bottom:30px;">
                <h3 style="color:#fff;margin-bottom:20px;">Add New Item</h3>
                <form id="add-product-form">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                        <input type="text" name="name" placeholder="Product Name" required>
                        <input type="number" name="price" placeholder="Sale Price" required>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                        <input type="number" name="oldPrice" placeholder="Old Price (Optional)">
                        <div>
                            <label style="color:#ccc; display:block; margin-bottom:5px;">Product Images (Unlimited)</label>
                            <input type="file" id="imageInput" accept="image/*" multiple style="padding: 7px; width:100%; cursor: pointer;">
                            <p style="font-size:0.8em; color:#777; margin-top:5px;">Hold 'Ctrl' to select multiple images.</p>
                        </div>
                    </div>
                    
                    <div class="checkbox-group" style="margin-top:15px;">
                        <input type="checkbox" id="isNew" name="isNew">
                        <label for="isNew" style="color:#ff9f43;cursor:pointer;">Mark as New Arrival</label>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" style="width:100%;">Save Product</button>
                </form>
            </div>

            <div class="data-section">
                <h3 style="color:#fff;">Current Stock (<span id="current-product-count">0</span>)</h3>
                <table id="product-table">
                    <thead><tr><th>Thumbnail</th><th>Name</th><th>Price</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
