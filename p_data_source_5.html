<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory | LYNEX Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="x_master_v9.html">Dashboard</a></li>
                <li><a href="p_data_source_5.html" class="admin-active">Inventory</a></li>
                <li><a href="o_log_file_22.html" id="nav-orders">Orders</a></li>
                <li><a href="m_feed_back_01.html" id="nav-messages">Feedback</a></li>
                <li><a href="index.html" style="margin-top: 50px;">Go to Website</a></li>
                <li><a href="#" onclick="adminLogout()">Disconnect</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Product Inventory</h1>
            </div>

            <div class="data-section" style="margin-bottom: 30px; border: 1px solid #333;">
                <div style="border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;">
                    <h3 style="color: #ff9f43; font-size: 1.2em;"><i class="fas fa-plus-circle"></i> Add New Item</h3>
                </div>
                
                <form id="add-product-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label>Product Name</label>
                            <input type="text" id="prodName" name="name" placeholder="Enter product name" required>
                        </div>
                        
                        <div>
                            <label>Sale Price (৳)</label>
                            <input type="number" id="prodPrice" name="price" placeholder="0.00" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label>Original Price (Optional)</label>
                            <input type="number" id="prodOldPrice" name="oldPrice" placeholder="0.00">
                        </div>
                        
                        <div>
                            <label>Product Images</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="file" id="imageInput" accept="image/*" multiple style="padding: 8px; flex: 1; cursor: pointer;">
                            </div>
                            <small style="color: #777;">Hold 'Ctrl' to select multiple images.</small>
                        </div>
                    </div>
                    
                    <div id="image-preview-container" style="display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0;"></div>

                    <div class="checkbox-group" style="margin-top: 10px;">
                        <input type="checkbox" id="isNew" name="isNew">
                        <label for="isNew" style="color: #ff9f43; cursor: pointer; margin-bottom: 0; font-weight: 600;">
                            Mark as "New Arrival"
                        </label>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 1em;">
                        <i class="fas fa-save"></i> Save Product
                    </button>
                </form>
            </div>

            <div class="data-section" style="border: 1px solid #333;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                    <h3 style="color: #fff;"><i class="fas fa-list"></i> Stock List</h3>
                    <span style="background: #ff9f43; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9em;">
                        Total: <span id="current-product-count">0</span>
                    </span>
                </div>
                
                <table id="product-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #222; text-align: left;">
                            <th style="padding: 12px; color: #ccc;">Image</th>
                            <th style="padding: 12px; color: #ccc;">Name</th>
                            <th style="padding: 12px; color: #ccc;">Price</th>
                            <th style="padding: 12px; color: #ccc;">Status</th>
                            <th style="padding: 12px; color: #ccc; text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
