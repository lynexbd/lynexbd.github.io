<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory | LYNEX Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="x_master_v9.html">Dashboard</a></li>
                <li><a href="p_data_source_5.html" class="admin-active">Inventory</a></li>
                <li><a href="o_log_file_22.html" id="nav-orders">Orders</a></li>
                <li><a href="m_feed_back_01.html" id="nav-messages">Feedback</a></li>
                <li><a href="index.html" style="margin-top: 50px;">Go to Website</a></li>
                <li><a href="#" onclick="adminLogout()">Disconnect</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header"><h1>Inventory Management</h1></div>
            
            <div class="data-section" style="margin-bottom:30px; max-width: 600px;">
                <h3 style="color:#fff; margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px;">Add New Item</h3>
                
                <form id="add-product-form">
                    
                    <div style="margin-bottom: 15px;">
                        <label>Product Name</label>
                        <input type="text" name="name" placeholder="Product Name" required style="margin-bottom:0;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label>Sale Price (৳)</label>
                        <input type="number" name="price" placeholder="Sale Price" required style="margin-bottom:0;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label>Original Price (Optional)</label>
                        <input type="number" name="oldPrice" placeholder="Old Price" style="margin-bottom:0;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="color:#ff9f43;">Product Images (Unlimited)</label>
                        <input type="file" id="imageInput" accept="image/*" multiple style="padding: 9px; cursor: pointer; margin-bottom:5px;">
                        <p style="font-size:0.8em; color:#777;">Hold 'Ctrl' to select multiple images.</p>
                    </div>
                    
                    <div class="checkbox-group" style="margin-bottom: 20px;">
                        <input type="checkbox" id="isNew" name="isNew">
                        <label for="isNew" style="color:#ff9f43; cursor:pointer;">Mark as New Arrival</label>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" style="width:100%;">Save Product</button>
                </form>
            </div>

            <div class="data-section">
                <h3 style="color:#fff;">Current Stock (<span id="current-product-count">0</span>)</h3>
                <table id="product-table">
                    <thead><tr><th>Thumbnail</th><th>Name</th><th>Price</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
