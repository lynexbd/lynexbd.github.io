<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory | LYNEX Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="x_master_v9.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="p_data_source_5.html" class="admin-active"><i class="fas fa-box"></i> Products</a></li>
                <li><a href="o_log_file_22.html" id="nav-orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="m_feed_back_01.html" id="nav-messages"><i class="fas fa-comment-dots"></i> Feedback</a></li>
                <li><a href="index.html" target="_blank" style="margin-top: 50px;"><i class="fas fa-globe"></i> Go to Website</a></li>
                <li><a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Product Management</h1>
            </div>

            <div class="data-section" style="margin-bottom: 30px;">
                <h3 style="color: #fff; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">Add New Item</h3>
                
                <form id="add-product-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label>Product Name</label>
                            <input type="text" name="name" placeholder="e.g. Premium T-Shirt" required>
                        </div>
                        <div>
                            <label>Sale Price (৳)</label>
                            <input type="number" name="price" placeholder="e.g. 1200" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label>Original Price (Optional)</label>
                            <input type="number" name="oldPrice" placeholder="Old Price (e.g. 1500)">
                        </div>
                        <div>
                            <label>Product Images (Select Multiple)</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="file" id="imageInput" accept="image/*" multiple style="padding: 7px; flex: 1; cursor: pointer;">
                                <button type="button" onclick="previewImages()" class="btn secondary-btn">Preview</button>
                            </div>
                        </div>
                    </div>

                    <div id="image-preview-container" style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;"></div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="isNew" name="isNew">
                        <label for="isNew" style="color: #ff9f43; cursor: pointer; margin-bottom: 0; font-weight: 600;">
                            Mark as "New Arrival"
                        </label>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" style="width: 100%; padding: 12px; font-size: 1em;">
                        <i class="fas fa-plus-circle"></i> Save Product
                    </button>
                </form>
            </div>

            <div class="data-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color: #fff;">Inventory List</h3>
                    <span style="background: #ff9f43; color: #000; padding: 5px 10px; border-radius: 4px; font-weight: bold;">
                        Total: <span id="current-product-count">0</span>
                    </span>
                </div>
                
                <table id="product-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Product Name</th>
                            <th>Price Info</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
