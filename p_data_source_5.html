<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products | LYNEX Admin</title>
    <meta name="viewport" content="width=1366">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX</h2>
            <ul>
                <li><a href="x_master_v9.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
                <li><a href="p_data_source_5.html" class="admin-active"><i class="fas fa-box-open"></i> <span>Products</span></a></li>
                <li><a href="o_log_file_22.html" id="nav-orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
                <li><a href="m_feed_back_01.html" id="nav-messages"><i class="fas fa-comment-dots"></i> <span>Feedback</span></a></li>
                <li><a href="index.html" target="_blank"><i class="fas fa-globe"></i> <span>Visit Site</span></a></li>
                <li style="margin-top: auto;"><a href="#" onclick="adminLogout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Product Inventory</h1>
            </div>

            <div class="data-section" style="margin-bottom: 30px;">
                <h3 style="color: #fff; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">Add New Item</h3>
                
                <form id="add-product-form" class="admin-form">
                    <div style="margin-bottom: 15px;">
                        <label>Product Name</label>
                        <input type="text" name="name" placeholder="Product Name" required style="margin-bottom:0;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label>Sale Price (৳)</label>
                        <input type="number" name="price" placeholder="Sale Price" required style="margin-bottom:0;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label>Original Price (Optional)</label>
                        <input type="number" name="oldPrice" placeholder="Old Price" style="margin-bottom:0;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="color:#ff9f43;">Product Images (Unlimited)</label>
                        <input type="file" id="imageInput" accept="image/*" multiple style="padding: 9px; cursor: pointer; margin-bottom:5px;">
                        <p style="font-size:0.8em; color:#777;">Hold 'Ctrl' to select multiple images.</p>
                    </div>
                    
                    <div class="checkbox-group" style="margin-bottom: 20px;">
                        <input type="checkbox" id="isNew" name="isNew">
                        <label for="isNew" style="color:#ff9f43; cursor:pointer; margin-bottom:0;">Mark as New Arrival</label>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" style="width:100%;">Save Product</button>
                </form>
            </div>

            <div class="data-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color: #fff;">Current Item</h3>
                    <span style="background: #ff9f43; color: #000; padding: 5px 10px; border-radius: 4px; font-weight: bold;">
                        Total: <span id="current-product-count">0</span>
                    </span>
                </div>
                
                <table id="product-table">
                    <thead>
                        <tr>
                            <th>Thumbnail</th>
                            <th>Name & Status</th>
                            <th>Price Info</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
