<div style="background: #1e1e1e; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; border: 1px solid #333;">
    <h3 style="margin-bottom: 20px; color: #fff;">Total: ৳ <span id="checkout-total">0</span></h3>
    <p style="margin-bottom: 25px; color: #aaa; font-style: italic;">* ডেলিভারি চার্জ এবং সকল তথ্যের জন্যে আপনাকে কল করা হবে।</p>
    
    <form id="checkout-form">
        <div>
            <label style="color:#ccc;">Name</label>
            <input type="text" name="name" required placeholder="আপনার নাম" style="width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; color: #fff; margin-bottom: 15px;">
        </div>
        <div>
            <label style="color:#ccc;">Phone Number</label>
            <input type="text" name="phone" required placeholder="মোবাইল নাম্বার" style="width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; color: #fff; margin-bottom: 15px;">
        </div>
        <div>
            <label style="color:#ccc;">Shipping Address</label>
            <textarea name="address" required rows="3" placeholder="সম্পূর্ণ ঠিকানা" style="width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; color: #fff; margin-bottom: 15px;"></textarea>
        </div>
        <button type="submit" class="btn primary-btn" style="width: 100%; padding: 12px; font-weight: bold;">Confirm Order</button>
    </form>
</div>
