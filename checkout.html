<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | LYNEX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <span class="logo-lyn">LYN</span><span class="logo-ex">EX</span>
                </a>
            </div>
        </div>
    </header>

    <div class="container" style="padding: 120px 20px 50px;">
        <h2 class="section-title">Checkout</h2>
        <div style="background: #1e1e1e; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; border: 1px solid #333;">
            <h3 style="margin-bottom: 20px; color: #fff;">Total Amount: ৳ <span id="checkout-total">0</span></h3>
            <p style="margin-bottom: 25px; color: #aaa; font-style: italic;">* ডেলিভারি চার্জ এবং সকল তথ্যের জন্যে আপনাকে কল করা হবে।</p>
            
            <form id="checkout-form">
                <div><label>Full Name</label><input type="text" name="name" required></div>
                <div><label>Phone Number</label><input type="text" name="phone" required></div>
                <div><label>Shipping Address</label><textarea name="address" required rows="4"></textarea></div>
                <button type="submit" class="btn primary-btn" style="width: 100%;">Confirm Order</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
