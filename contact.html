    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo"><a href="index.html"><span class="logo-lyn">LYN</span><span class="logo-e">E</span><span class="logo-x">X</span></a></div>
            <nav class="nav">
                <ul class="nav-list" id="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>

                </ul>

            </nav>
        </div>
    </header>

    <div class="container" style="padding: 100px 20px;">
        <h2 class="section-title" style="color: #ffffff;">Get In Touch</h2>
        
        <div style="background: #1e1e1e; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; border: 1px solid #333;">
            <form id="contact-form">
                <div><label>Name</label><input type="text" name="name" required placeholder="Your Name"></div>
                <div><label>Email</label><input type="email" name="email" required placeholder="Your Email"></div>
                <div><label>Subject</label><input type="text" name="subject" required placeholder="Subject"></div>
                <div><label>Message</label><textarea name="message" rows="5" required placeholder="Write your message here..."></textarea></div>
                <button type="submit" class="btn primary-btn" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <h2 class="footer-brand">LYNEX</h2>
            <p class="footer-desc">A glimpse into modern fashion, combining style and comfort for the trendsetters of tomorrow.</p>
            
            <h3 class="footer-links-title">LINKS</h3>
