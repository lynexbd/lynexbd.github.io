<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | LYNEX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <span class="logo-lyn">LYN</span><span class="logo-ex">EX</span>
                </a>
            </div>
            <nav class="nav">
                <ul class="nav-list" id="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="cart.html" class="active cart-icon"><i class="fas fa-shopping-cart"></i> <span class="cart-count">(0)</span></a></li>
                </ul>
                <div class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
            </nav>
        </div>
    </header>

    <section class="page-header container" style="padding-top: 120px;">
        <h1 class="page-title">Your Cart</h1>
    </section>

    <section class="cart-section container">
        <div class="cart-items">
            </div>

        <div class="cart-summary">
            <h3>Cart Summary</h3>
            <div class="summary-row">
                <strong>Order Total:</strong>
                <strong>৳ <span id="cart-total">0</span></strong>
            </div>
            <div class="summary-row" style="font-size: 0.9em; color: #aaa; margin-top: 15px; font-style: italic;">
                <p>* ডেলিভারি চার্জ এবং সকল তথ্যের জন্যে আপনাকে কল করা হবে।</p>
            </div>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #333;">
            <a href="checkout.html" class="btn primary-btn checkout-btn">PROCEED TO CHECKOUT</a>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
