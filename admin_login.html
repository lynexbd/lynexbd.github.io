<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LYNEX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #121212;">
    <div class="login-container">
        <h2>LYNEX ADMIN</h2>
        <form id="admin-login-form">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn primary-btn" style="width: 100%;">LOGIN</button>
        </form>
        <p style="margin-top: 20px;"><a href="index.html" style="color: #ff9f43;">&laquo; Back to Website</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
