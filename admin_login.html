<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | LYNEX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #121212;">
    <div class="login-container" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; color: #ff9f43; margin-bottom: 30px;">LYNEX ADMIN</h2>
        <form id="admin-login-form">
            <div>
                <label style="color: #ccc;">Username</label>
                <input type="text" name="username" placeholder="admin" required>
            </div>
            <div>
                <label style="color: #ccc;">Password</label>
                <input type="password" name="password" placeholder="1234" required>
            </div>
            <button type="submit" class="btn primary-btn" style="width: 100%; margin-top: 10px;">LOGIN</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #ff9f43; text-decoration: none;">&laquo; Back to Website</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
