<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | LYNEX Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX ADMIN</h2>
            <ul>
                <li><a href="x_master_v9.html" class="admin-active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="p_data_source_5.html"><i class="fas fa-box"></i> Products</a></li>
                <li><a href="o_log_file_22.html" id="nav-orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="m_feed_back_01.html" id="nav-messages"><i class="fas fa-comment-dots"></i> Feedback</a></li>
                <li><a href="index.html" target="_blank" style="margin-top: 50px;"><i class="fas fa-globe"></i> Go to Website</a></li>
                <li><a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Dashboard Overview</h1>
            </div>

            <div class="widget-grid">
                <div class="widget" style="border-color: #2ecc71;">
                    <h3>Total Revenue (Completed)</h3>
                    <p id="stat-revenue" style="color: #2ecc71;">৳ 0</p>
                </div>
                <div class="widget" style="border-color: #ff9f43;">
                    <h3>Pending Orders</h3>
                    <p id="stat-pending" style="color: #ff9f43;">0</p>
                </div>
                <div class="widget" style="border-color: #3498db;">
                    <h3>Shipped Orders</h3>
                    <p id="stat-shipped" style="color: #3498db;">0</p>
                </div>
                <div class="widget" style="border-color: #2ecc71;">
                    <h3>Delivered Orders</h3>
                    <p id="stat-delivered" style="color: #2ecc71;">0</p>
                </div>
                <div class="widget" style="border-color: #e74c3c;">
                    <h3>Cancelled Orders</h3>
                    <p id="stat-cancelled" style="color: #e74c3c;">0</p>
                </div>
                <div class="widget">
                    <h3>Total Products</h3>
                    <p id="stat-products">0</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
