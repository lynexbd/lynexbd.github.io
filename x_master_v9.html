<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | LYNEX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <h2>LYNEX</h2>
            <ul>
                <li><a href="x_master_v9.html" class="admin-active"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
                <li><a href="p_data_source_5.html"><i class="fas fa-box"></i> <span>Products</span></a></li>
                <li><a href="o_log_file_22.html" id="nav-orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
                <li><a href="m_feed_back_01.html" id="nav-messages"><i class="fas fa-comment-dots"></i> <span>Feedback</span></a></li>
                <li><a href="index.html" target="_blank"><i class="fas fa-globe"></i> <span>Visit Site</span></a></li>
                <li style="margin-top: auto;"><a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="dashboard-header">
                <h1>Dashboard Overview</h1>
                <div class="user-info" style="color: #ccc;">Welcome, Admin</div>
            </div>

            <div class="widget-grid">
                <div class="widget" style="border-left-color: #2ecc71;">
                    <h3>Total Revenue</h3>
                    <p id="stat-revenue" style="color: #2ecc71;">৳ 0</p>
                    <i class="fas fa-money-bill-wave" style="float: right; opacity: 0.2; margin-top: -40px; font-size: 2em;"></i>
                </div>
                <div class="widget" style="border-left-color: #ff9f43;">
                    <h3>Pending Orders</h3>
                    <p id="stat-pending" style="color: #ff9f43;">0</p>
                    <i class="fas fa-clock" style="float: right; opacity: 0.2; margin-top: -40px; font-size: 2em;"></i>
                </div>
                <div class="widget" style="border-left-color: #3498db;">
                    <h3>Shipped</h3>
                    <p id="stat-shipped" style="color: #3498db;">0</p>
                    <i class="fas fa-truck" style="float: right; opacity: 0.2; margin-top: -40px; font-size: 2em;"></i>
                </div>
                <div class="widget" style="border-left-color: #9b59b6;">
                    <h3>Total Products</h3>
                    <p id="stat-products" style="color: #9b59b6;">0</p>
                    <i class="fas fa-tshirt" style="float: right; opacity: 0.2; margin-top: -40px; font-size: 2em;"></i>
                </div>
            </div>

            <div class="data-section">
                <h3 style="color:#fff; margin-bottom:20px;">Quick Stats</h3>
                <p style="color:#888;">Overview of delivered and cancelled orders.</p>
                <div style="display:flex; gap:30px; margin-top:15px;">
                    <div style="flex:1; background:#252525; padding:15px; border-radius:8px;">
                        <span style="color:#aaa;">Delivered Orders</span>
                        <h2 id="stat-delivered" style="color:#fff;">0</h2>
                    </div>
                    <div style="flex:1; background:#252525; padding:15px; border-radius:8px;">
                        <span style="color:#aaa;">Cancelled Orders</span>
                        <h2 id="stat-cancelled" style="color:#e74c3c;">0</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
