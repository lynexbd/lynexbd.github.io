<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000;">
    <div class="login-container" style="width: 100%; max-width: 400px; border: 1px solid #333;">
        <h2 style="text-align: center; color: #ff9f43; margin-bottom: 30px;">SYSTEM ACCESS</h2>
        <form id="secure-login-form">
            <div><label style="color:#ccc;">User ID</label><input type="text" name="username" required></div>
            <div><label style="color:#ccc;">Pass Key</label><input type="password" name="password" required></div>
            <button type="submit" class="btn primary-btn" style="width: 100%; margin-top: 10px;">AUTHENTICATE</button>
        </form>
        <p style="text-align: center; margin-top: 20px;"><a href="index.html" style="color: #555;">Return</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
